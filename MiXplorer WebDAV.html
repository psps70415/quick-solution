<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiXplorer WebDAV Launcher</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            color: var(--text-main);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .ip-input-container {
            display: flex;
            align-items: center;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0 12px;
        }

        .ip-prefix {
            font-family: monospace;
            font-size: 16px;
            color: var(--text-muted);
            user-select: none;
        }

        .ip-suffix-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: monospace;
            font-size: 16px;
            padding: 10px 4px;
            outline: none;
            width: 100%;
        }

        /* Hide arrow spin buttons */
        .ip-suffix-input::-webkit-outer-spin-button,
        .ip-suffix-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .ip-suffix-input[type=number] {
            -moz-appearance: textfield;
        }

        .static-input {
            width: 100%;
            box-sizing: border-box;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-family: monospace;
            font-size: 15px;
            padding: 10px 12px;
            outline: none;
        }

        .static-input:focus, .ip-input-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .button {
            width: 100%;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .button:hover {
            background-color: var(--accent-hover);
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MiX WebDAV Launcher</h2>
    <p class="subtitle">Quickly launch your server in this tab</p>

    <form id="launcherForm">
        <div class="form-group">
            <label for="ipSuffix">Enter last 3 digits of IP Address:</label>
            <div class="ip-input-container">
                <span class="ip-prefix">192.168.1.</span>
                <input 
                    type="number" 
                    id="ipSuffix" 
                    class="ip-suffix-input" 
                    placeholder="245" 
                    min="1" 
                    max="254" 
                    required 
                    autofocus
                >
            </div>
            <div class="hint">The full IP will resolve to 192.168.1.[your-digits]</div>
        </div>

        <div class="form-group">
            <label for="port">Port Number:</label>
            <input type="text" id="port" class="static-input" value="8181">
        </div>

        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" class="static-input" value="Admin">
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" class="static-input" value="Admin">
        </div>

        <button type="submit" class="button">Launch Server</button>
    </form>
</div>

<script>
    document.getElementById('launcherForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const suffix = document.getElementById('ipSuffix').value.trim();
        const port = document.getElementById('port').value.trim();
        const username = encodeURIComponent(document.getElementById('username').value.trim());
        const password = encodeURIComponent(document.getElementById('password').value.trim());
        
        const ipAddress = `192.168.1.${suffix}`;
        const webdavUrl = `https://${username}:${password}@${ipAddress}:${port}`;
        
        // Opens the URL in the exact same tab, replacing the launcher page
        window.location.href = webdavUrl;
    });
</script>

</body>
</html>
